<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;align-items:flex-start;justify-content:flex-start;gap:0}
.icon-wrap{position:relative;display:inline-block;width:512px;height:512px;flex-shrink:0}
.icon-wrap svg{position:absolute;top:0;left:0;width:512px;height:512px}
.icon-char{position:absolute;top:0;left:0;width:512px;height:512px;display:flex;align-items:center;justify-content:center;font-size:450px;line-height:1;padding-bottom:24px;color:#f8e8c0;font-family:'Zhi Mang Xing',cursive}
</style>
</head>
<body>
<div class="icon-wrap" id="icon512">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg" cx="38%" cy="32%" r="70%">
        <stop offset="0%" stop-color="#7a0f0f"/>
        <stop offset="100%" stop-color="#180202"/>
      </radialGradient>
      <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffe880"/>
        <stop offset="50%" stop-color="#c89018"/>
        <stop offset="100%" stop-color="#7a5208"/>
      </linearGradient>
    </defs>
    <rect width="512" height="512" rx="100" fill="url(#bg)"/>
    <circle cx="256" cy="256" r="230" fill="none" stroke="url(#gg)" stroke-width="10"/>
    <circle cx="256" cy="256" r="212" fill="none" stroke="url(#gg)" stroke-width="2" opacity=".4"/>
    <g stroke="url(#gg)" stroke-width="2.5" opacity=".3">
      <line x1="256" y1="26" x2="256" y2="60"/>
      <line x1="256" y1="452" x2="256" y2="486"/>
      <line x1="26" y1="256" x2="60" y2="256"/>
      <line x1="452" y1="256" x2="486" y2="256"/>
      <line x1="84" y1="84" x2="108" y2="108"/>
      <line x1="404" y1="84" x2="428" y2="108"/>
      <line x1="84" y1="428" x2="108" y2="404"/>
      <line x1="404" y1="428" x2="428" y2="404"/>
    </g>
  </svg>
  <div class="icon-char">九</div>
</div>

<script>
// 等字型載入後自動匯出
document.fonts.ready.then(() => {
  setTimeout(() => {
    const el = document.getElementById('icon512');
    // 通知主頁面字型已就緒
    document.title = 'READY';
  }, 500);
});
</script>
</body>
</html>
