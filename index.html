<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九宮姓名筆劃查詢</title>
<style>
:root{--red:#8B1A1A;--gold:#C8981A;--bg:#fffdf5;--card:#fff;--text:#2c1a0a;--sub:#7a5430;--border:#e8d5a3;--mu:#2a7a2a;--huo:#cc2200;--tu:#a07800;--jin:#b8860b;--shui:#1a4fa0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC','微軟正黑體',serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#4a0808,#8B1A1A,#9e1f0e);color:#f5e6c8;padding:20px;text-align:center;border-bottom:3px solid var(--gold);box-shadow:0 4px 12px rgba(0,0,0,.25)}
header h1{font-size:1.75em;letter-spacing:5px;text-shadow:1px 2px 4px rgba(0,0,0,.4)}
header p{font-size:.83em;margin-top:5px;opacity:.78;letter-spacing:1px}
main{max-width:880px;margin:0 auto;padding:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.card-title{font-size:1.05em;color:var(--red);font-weight:bold;border-bottom:2px solid var(--gold);padding-bottom:8px;margin-bottom:16px;letter-spacing:2px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.if{display:flex;flex-direction:column;gap:6px}
label{font-size:.88em;color:var(--sub);font-weight:bold}
input[type=text]{border:2px solid var(--border);border-radius:6px;padding:10px 13px;font-size:1.05em;font-family:inherit;color:var(--text);transition:border-color .2s;background:#fffef8}
input:focus{outline:none;border-color:var(--red)}
input.input-err{border-color:#cc2200!important;background:#fff5f5!important}
.input-err-msg{color:#cc2200;font-size:.8em;margin-top:3px;display:none}
.input-err-msg.show{display:block}
.bdate{display:flex;gap:7px;align-items:center}
.bdate input{flex:1}
.bdate span{color:var(--sub);font-weight:bold;font-size:1.1em}
.btn{background:linear-gradient(135deg,var(--red),#6b0e0e);color:#f5e6c8;border:none;border-radius:7px;padding:13px;font-size:1.1em;font-family:inherit;cursor:pointer;letter-spacing:3px;width:100%;margin-top:12px;box-shadow:0 3px 10px rgba(139,26,26,.3);transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(139,26,26,.4)}
.char-boxes{display:flex;gap:14px;flex-wrap:wrap}
.cbox{display:flex;flex-direction:column;align-items:center;border:2px solid var(--gold);border-radius:10px;padding:12px 18px;min-width:76px;background:linear-gradient(160deg,#fffdf5,#fff8e8);transition:box-shadow .2s}
.cbox:hover{box-shadow:0 3px 10px rgba(200,152,26,.3)}
.cbox .ch{font-size:2.2em;color:var(--red)}
.cbox .sl{font-size:.75em;color:var(--sub);margin-top:3px}
.cbox .sn{font-size:1.25em;font-weight:bold;color:var(--text)}
.cbox.unknown{border-color:#cc2200;background:#fff5f5}
.cbox.unknown .ch{color:#cc2200}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--border);padding:10px 14px;text-align:center}
th{background:#f8efd8;color:var(--red);font-weight:bold;font-size:.9em}
.eb{display:inline-block;padding:3px 12px;border-radius:20px;font-weight:bold;color:#fff;font-size:.88em}
.mu{background:var(--mu)}.huo{background:var(--huo)}.tu{background:var(--tu)}.jin{background:var(--jin)}.shui{background:var(--shui)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pcard{border:1px solid var(--border);border-radius:9px;overflow:hidden}
.phdr{background:linear-gradient(135deg,var(--red),#6b0e0e);color:#f5e6c8;padding:10px;text-align:center;font-weight:bold;font-size:.95em;letter-spacing:2px}
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{background:#f8efd8;color:var(--sub);font-size:.78em;padding:6px;border-bottom:1px solid var(--border)}
.ptbl td{padding:8px 10px;text-align:center;border-bottom:1px solid #f0e8d0;font-size:.92em}
.ptbl tr.now{background:linear-gradient(90deg,#d46a00,#b85200);font-weight:bold}
.ptbl tr.now td{color:#fff!important}
.ptbl tr.now td:first-child::before{content:'▶ '}
.ptbl tr.next{background:linear-gradient(90deg,#eef6ff,#e8f2ff);font-weight:bold;color:#1a4a8b}
.ptbl tr.next td:first-child::before{content:'◈ '}
.ptbl tr.past td{color:#bbb}
.ainfo{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.abadge{background:var(--red);color:#f5e6c8;padding:9px 22px;border-radius:30px;font-size:1.15em;font-weight:bold}
.arange{color:var(--sub);font-size:.88em;line-height:1.7}
#results{display:none}
.note{font-size:.8em;color:var(--sub);margin-top:8px;padding:8px;background:#f9f2e4;border-radius:5px;border-left:3px solid var(--gold)}
.grid5 .row-highlight{background:#fffae8}
.manual-area{margin-top:14px;padding:12px;background:#fff8f0;border:1px dashed var(--gold);border-radius:6px}
.manual-area label{color:var(--red)}
.manual-row{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.manual-row .mchar{font-size:1.5em;font-weight:bold;color:var(--red);width:30px}
.manual-row input{width:70px}
.fuxing-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding:8px 12px;background:#fff8f0;border:1px solid var(--border);border-radius:6px}
.fuxing-row label{font-size:.88em;color:var(--sub);font-weight:bold;cursor:pointer}
.fuxing-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--red)}
.wx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.wx-card{border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;background:#fffef8}
.wx-card .wt{font-size:.78em;color:var(--sub);margin-bottom:4px}
.wx-card .we{display:flex;align-items:center;justify-content:center;gap:6px;font-weight:bold;font-size:1em}
.wx-card .wrel{font-size:.82em;margin-top:4px;padding:3px 8px;border-radius:12px;display:inline-block}
.rel-sheng{background:#e8f5e9;color:#1b5e20}
.rel-ke{background:#ffebee;color:#b71c1c}
.rel-ke2{background:#fff3e0;color:#e65100}
.rel-bi{background:#f5f5f5;color:#555}
.arch-svg-wrap{overflow-x:auto;text-align:center}
.pgrid8{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pgrid8 .pcard-note{border:1px dashed var(--border);border-radius:9px;padding:14px;text-align:center;background:#fafafa;color:var(--sub);font-size:.88em}
.arch-label{font-size:.82em;fill:#7a5430;font-family:'Noto Serif TC',serif}
@media(max-width:600px){.ig{grid-template-columns:1fr}.pgrid{grid-template-columns:1fr}.pgrid8{grid-template-columns:1fr}header h1{font-size:1.35em}.wx-grid{grid-template-columns:1fr 1fr}.dual-summary-grid{grid-template-columns:1fr!important}}
.btn-dual{background:linear-gradient(135deg,#1a3a6b,#0e2050);color:#e0eaff;border:none;border-radius:7px;padding:11px;font-size:.95em;font-family:inherit;cursor:pointer;letter-spacing:2px;width:100%;transition:all .2s;box-shadow:0 3px 8px rgba(26,58,107,.25)}
.btn-dual:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(26,58,107,.4)}
.btn-dual.on{background:linear-gradient(135deg,#6b0e0e,#4a0808)}
.dual-section{background:#f0f5ff;border:1px solid #c0d0f0;border-radius:8px;padding:14px;margin-top:14px}
.dual-section-title{color:#1a3a6b;font-weight:bold;font-size:.9em;border-bottom:1px solid #c0d0f0;padding-bottom:8px;margin-bottom:12px;letter-spacing:2px}
.svg-zoomable{cursor:zoom-in;position:relative;display:inline-block}
.svg-zoomable::after{content:'🔍';position:absolute;bottom:4px;right:4px;font-size:14px;opacity:.5}
.svg-zoomable:hover::after{opacity:1}
#svg-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
#svg-modal.open{display:flex}
#svg-modal-inner{background:#fff8f0;border-radius:16px;padding:24px;max-width:90vw;max-height:90vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,.4);cursor:default}
#svg-modal-inner svg{width:min(80vw,80vh);height:min(80vw,80vh)}
.cmp-card-title{color:#1a3a6b;border-bottom-color:#4a7ab5}
.person-b-title{color:#1a3a6b;border-bottom-color:#4a7ab5}
</style>
</head>
<body>
<header>
  <h1>⊹ 九宮姓名筆劃查詢 ⊹</h1>
  <p>輸入姓名與出生年月日，即可查詢命格筆劃與九宮發動年</p>
</header>
<main>
  <div class="card">
    <div class="card-title">✦ 輸入資料</div>
    <div class="ig">
      <div class="if">
        <label for="name">姓名（2〜4個字）</label>
        <input type="text" id="name" name="name" autocomplete="on" placeholder="例：郭台銘 / 武田信玄" maxlength="4">
      </div>
      <div class="if">
        <label>出生年月日（民國）</label>
        <div class="bdate">
          <input type="text" inputmode="numeric" pattern="[0-9]*" id="by" name="birth_year" autocomplete="on" placeholder="年" maxlength="3" style="max-width:65px" oninput="validateDate(this,'year')">
          <span>/</span>
          <input type="text" inputmode="numeric" pattern="[0-9]*" id="bm" name="birth_month" autocomplete="on" placeholder="月" maxlength="2" style="max-width:55px" oninput="validateDate(this,'month')">
          <span>/</span>
          <input type="text" inputmode="numeric" pattern="[0-9]*" id="bd" name="birth_day" autocomplete="on" placeholder="日" maxlength="2" style="max-width:55px" oninput="validateDate(this,'day')">
        </div>
        <div id="date-err" class="input-err-msg"></div>
      </div>
    </div>
    <div class="fuxing-row">
      <input type="checkbox" id="fuxing">
      <label for="fuxing">複姓（雙字姓）— 如：歐陽、司馬、武田、德川等</label>
    </div>
    <div id="manual-section"></div>
    <button class="btn" onclick="doQuery()">✦ 查詢姓名筆劃 ✦</button>
    <div id="dual-input" style="display:block;margin-top:12px;border-top:1px dashed var(--border);padding-top:12px" class="dual-section">
      <div class="dual-section-title">👫 第二人資料（選填）— 填入後自動進行雙人命格比對</div>
      <div class="ig">
        <div class="if">
          <label for="name_b">姓名（2〜4個字）</label>
          <input type="text" id="name_b" name="name_b" autocomplete="on" placeholder="例：林志玲" maxlength="4" oninput="saveForm()">
        </div>
        <div class="if">
          <label>出生年月日（民國）</label>
          <div class="bdate">
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="by_b" name="birth_year_b" autocomplete="on" placeholder="年" maxlength="3" style="max-width:65px" oninput="validateDate(this,'year');saveForm()">
            <span>/</span>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="bm_b" name="birth_month_b" autocomplete="on" placeholder="月" maxlength="2" style="max-width:55px" oninput="validateDate(this,'month');saveForm()">
            <span>/</span>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="bd_b" name="birth_day_b" autocomplete="on" placeholder="日" maxlength="2" style="max-width:55px" oninput="validateDate(this,'day');saveForm()">
          </div>
        </div>
      </div>
      <div class="fuxing-row">
        <input type="checkbox" id="fuxing_b">
        <label for="fuxing_b">複姓（雙字姓）</label>
      </div>
      <div id="manual-section-b"></div>
    </div>
  </div>

  <div id="comparison-result" style="display:none">
    <div class="card">
      <div class="card-title cmp-card-title">👫 雙人命格比對</div>
      <div id="comparison-content"></div>
    </div>
  </div>

  <div id="results">
    <div class="card">
      <div class="card-title">✦ 年齡資訊</div>
      <div id="age-info"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 筆劃分析</div>
      <div id="char-analysis"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 命格基本架構</div>
      <div class="arch-svg-wrap" id="mingge-diagram"></div>
      <div id="activation-note"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 流年運程</div>
      <div id="flowyear-section"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 五格分析</div>
      <div id="five-grids"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 五行生剋分析</div>
      <div id="wuxing-analysis"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 九宮發動年齡</div>
      <div id="palace-tables"></div>
      <div class="note">▲ 標示「▶」的列為目前正在發動的宮位週期。每個宮位發動後持續至下一個發動年。</div>
    </div>
  </div>

  <div id="results-b" style="display:none">
    <div class="card">
      <div class="card-title person-b-title">✦ 第二人：<span id="person-b-name"></span></div>
      <div id="age-info_b"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 命格基本架構</div>
      <div class="arch-svg-wrap" id="mingge-diagram_b"></div>
      <div id="activation-note_b"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 流年運程</div>
      <div id="flowyear-section_b"></div>
    </div>
    <div class="card">
      <div class="card-title">✦ 九宮發動年齡</div>
      <div id="palace-tables_b"></div>
      <div class="note">▲ 標示「▶」的列為目前正在發動的宮位週期。</div>
    </div>
  </div>
</main>

/* ── 五格計算 ── */
function calcGrids(s,n1,n2,n3,isFuXing){
  if(isFuXing){
    // 複姓：s=姓1,n1=姓2,n2=名1,n3=名2(optional)
    const S1=s||0,S2=n1||0,N1=n2||0,N2=n3||0;
    const tian=S1+S2;                    // 天格=姓1+姓2（不加虛一）
    const ren=S1+S2+N1;                  // 人格=天格+名1
    const di=N2?N1+N2:N1+1;
    const wai=N2?N2+1:1;
    const zong=N2?S1+S2+N1+N2:S1+S2+N1;
    return{tian,ren,di,wai,zong};
  }else{
    const S=s||0,N1=n1||0,N2=n2||0;
    const tian=S+1;
    const ren=S+N1;
    const di=N2?N1+N2:N1+1;
    const wai=N2?N2+1:1;
    const zong=N2?S+N1+N2:S+N1;
    return{tian,ren,di,wai,zong};
  }
}

/* ── 虛歲計算 ── */
function calcAge(by,bm,bd){
  const cur=TODAY.getFullYear();
  const cutoff=((bm+5)%12)+1;
  const isPast=TODAY>new Date(cur,cutoff-1,bd);
  const diff=cur-1911-by;
  const ov=new Date(cur,bm+5,bd).getFullYear()-cur;
  return (isPast?2:1)+diff-ov;
}

function getAgeRange(by,bm,bd){
  const cur=TODAY.getFullYear();
  const cutoff=((bm+5)%12)+1;
  const isPast=TODAY>new Date(cur,cutoff-1,bd);
  const sY=isPast?cur:cur-1;
  const m2s=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  const sm=m2s[cutoff-1];
  const pm=m2s[cutoff===1?11:cutoff-2];
  const eD=bd-1>0?bd-1:bd;
  return`民國${sY-1911}年${sm}月${bd}日 ～ 民國${sY+1-1911}年${pm}月${eD}日`;
}

/* ── 宮位發動年齡 ── */
function calcPalaceAges(grid,type){
  let ages=[];
  if(type==='命宮'||type==='奴僕宮'){ages=[grid-10,grid+1,grid+10];}
  else if(type==='父母宮'){ages=[grid+1,grid+10];}
  else if(type==='疾惡宮'){ages=[grid,grid+1,grid+10];}
  let last=ages[ages.length-1];
  while(last<110){last+=9;ages.push(last);}
  return ages.filter(a=>a>0&&a<120);
}

function wxRel(a,b){
  if(a===b)return{type:'比旺',cls:'rel-bi',sym:'≈',desc:'比旺（同行）'};
  if(SHENG[a]===b)return{type:'相生',cls:'rel-sheng',sym:'生',desc:a+'生'+b};

  if(KE[b]===a)return{type:'陰性剋',cls:'rel-ke2',sym:'剋',desc:b+'剋'+a+'（陰性）'};
  return{type:'？',cls:'rel-bi',sym:'?',desc:''};
}

    if(fxb)document.getElementById('fuxing_b').checked=fxb==='1';

}

/* ── 日期驗證 ── */
function validateDate(el,type){
  el.value=el.value.replace(/[^0-9]/g,'');
  const v=parseInt(el.value)||0;
  let err='';
  if(type==='month'&&el.value.length>0&&(v<1||v>12))err='月份需介於 1〜12';
  if(type==='day'&&el.value.length>0&&(v<1||v>31))err='日期需介於 1〜31';
  if(type==='year'&&el.value.length>0&&(v<1||v>120))err='民國年需介於 1〜120';
  el.classList.toggle('input-err',!!err);
  const errEl=el.closest('.if')?.querySelector('.input-err-msg')||document.getElementById('date-err');
  if(errEl){errEl.textContent=err;errEl.classList.toggle('show',!!err);}
}

/* ── 查詢入口 ── */
function doQuery(){
  const name=document.getElementById('name').value.trim();

  const bm=parseInt(document.getElementById('bm').value)||0;

  const ms=document.getElementById('manual-section');
  if(unknowns.length>0){
    let html=`<div class="manual-area"><b style="color:var(--red)">⚠ 以下文字不在字庫中，請手動輸入筆劃：</b>`;

  ms.innerHTML='';

  const hasPersonB=!!(nameB_check&&(parseInt(document.getElementById('by_b').value)||0));
  if(hasPersonB){

    const byB=parseInt(document.getElementById('by_b').value)||0;
    const bmB=parseInt(document.getElementById('bm_b').value)||0;
    const bdB=parseInt(document.getElementById('bd_b').value)||0;
    const isFXB=document.getElementById('fuxing_b').checked;
    if(!nameB||!byB||!bmB||!bdB){alert('請輸入第二人的完整資料');return;}
    const charsB=Array.from(nameB);
    const unknownsB=charsB.filter(c=>c&&!getStrokes(c)&&!manualOverrides[c]);
    const msb=document.getElementById('manual-section-b');
    if(unknownsB.length>0){
      let bh=`<div class="manual-area"><b style="color:var(--red)">⚠ 第二人有未知字，請輸入筆劃：</b>`;
      for(const c of unknownsB){
        bh+=`<div class="manual-row"><span class="mchar">${c}</span><span style="color:var(--sub)">筆劃：</span>
          <input type="number" id="mob_${c}" value="${manualOverrides[c]||''}" min="1" max="50" placeholder="?"></div>`;
      }
      bh+=`<button class="btn" style="margin-top:10px;max-width:200px" onclick="saveManualDual('${encodeURIComponent(name)}',${by},${bm},${bd},${isFX},'${encodeURIComponent(nameB)}',${byB},${bmB},${bdB},${isFXB})">確認後比對</button></div>`;
      msb.innerHTML=bh;return;
    }
    msb.innerHTML='';
    render(name,by,bm,bd,isFX);
    doRenderB(nameB,byB,bmB,bdB,isFXB,name,by,bm,bd,isFX);
  }else{

}


function saveManual(enc,by,bm,bd,isFX){
  const name=decodeURIComponent(enc);
  Array.from(name).forEach(c=>{
    const inp=document.getElementById('mo_'+c);
    if(inp){const v=parseInt(inp.value)||0;if(v>0)manualOverrides[c]=v;}
  });
  document.getElementById('manual-section').innerHTML='';
  render(name,by,bm,bd,isFX);
}

function render(name,by,bm,bd,isFX){
  const chars=Array.from(name);
  let s,n1,n2,n3;
  if(isFX){
    s=getS(chars[0]);n1=getS(chars[1]);
    n2=chars[2]?getS(chars[2]):0;n3=chars[3]?getS(chars[3]):0;
  }else{
    s=getS(chars[0]);n1=chars[1]?getS(chars[1]):0;
    n2=chars[2]?getS(chars[2]):0;n3=0;
  }
  const grids=calcGrids(s,n1,n2,n3,isFX);
  const age=calcAge(by,bm,bd);
  renderAge(age,by,bm,bd,getAgeRange(by,bm,bd));
  renderChars(chars,s,n1,n2,n3,isFX);
  lastSvgA=renderDiagram(chars,grids,s,n1,n2,n3,isFX);
  renderActivationNote(grids,age,chars,isFX);
  renderFlowYear(grids.zong,age,name);
  renderGrids(grids,chars,isFX);
  renderWuXing(grids);
  renderPalaces(grids,by,age);
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ── 筆劃分析 ── */
function renderChars(chars,s,n1,n2,n3,isFX){
  const strokes=isFX?[s,n1,n2,n3]:[s,n1,n2];
  const labels=isFX
    ?(chars.length===4?['姓（一）','姓（二）','名（一）','名（二）']:['姓（一）','姓（二）','名（一）'])
    :['姓氏','名（一）','名（二）'];
  let html='<div class="char-boxes">';
  for(let i=0;i<chars.length;i++){
    const c=chars[i],st=strokes[i];
    const known=getStrokes(c)||manualOverrides[c];
    html+=`<div class="cbox ${known?'':'unknown'}">
      <div class="ch">${c}</div>
      <div class="sl">${labels[i]}</div>
      <div class="sn">${st} 劃</div>
    </div>`;
  }
  html+='</div>';
  if(!isFX&&chars.length===2)html+=`<div class="note" style="margin-top:12px">ℹ 兩字姓名：地格＝名字筆劃＋1，外格固定為1</div>`;
  if(isFX&&chars.length===3)html+=`<div class="note" style="margin-top:12px">ℹ 複姓三字：地格＝名字筆劃＋1，外格固定為1</div>`;
  if(isFX)html+=`<div class="note" style="margin-top:6px;border-left-color:#8B1A1A">⚑ 複姓模式：天格＝姓1＋姓2（不加虛一）；人格＝天格＋名一</div>`;
  document.getElementById('char-analysis').innerHTML=html;
}

/* ── 命格基本架構 SVG ── */
function renderDiagram(chars,grids,s,n1,n2,n3,isFX){
  const EC=ELEMENT_COLOR;
  const R=65,EX=55,NX=210,LX=242;

  // 建立 entries
  let entries=[];
  if(isFX){
    entries.push({ch:chars[0],st:s,sub:'姓一',type:'sn'});
    entries.push({ch:chars[1],st:n1,sub:'姓二',type:'sn'});
    if(chars[2])entries.push({ch:chars[2],st:n2,sub:'名一',type:'nm'});
    if(chars[3])entries.push({ch:chars[3],st:n3,sub:'名二',type:'nm'});
    entries.push({ch:'虛一',st:1,sub:'',type:'vt'});
  }else{
    entries.push({ch:'虛一',st:1,sub:'',type:'vt'});
    entries.push({ch:chars[0],st:s,sub:'姓氏',type:'sn'});
    if(chars[1])entries.push({ch:chars[1],st:n1,sub:'名一',type:'nm'});
    if(chars[2])entries.push({ch:chars[2],st:n2,sub:'名二',type:'nm'});
    entries.push({ch:'虛一',st:1,sub:'',type:'vt'});
  }

  const nE=entries.length; // 4 or 5
  const nN=nE-1;           // 3 or 4 nodes
  const ey=i=>i*R+R/2;
  const ny=i=>(i+1)*R;

  const allNodes=[
    {val:grids.tian,name:'天格',pals:['② 父母宮'],side:'r'},
    {val:grids.ren, name:'人格',pals:['③ 疾惡宮','⑥ 財　宮'],side:'r'},
    {val:grids.di,  name:'地格',pals:['④ 奴僕宮','⑦ 子女宮','⑧ 夫妻宮'],side:'r'},
    {val:grids.wai, name:'外格',pals:['⑤ 遷移宮'],side:'l'},
  ];
  const nodes=allNodes.slice(0,nN);
  const hasWai=nN>=4;
  const ZX=EX;

  // 連線
  const lines=[];
  if(isFX){
    lines.push([0,'e',0,'n']);  // 姓1→天格
    lines.push([1,'e',0,'n']);  // 姓2→天格
    lines.push([0,'n',1,'n',true]); // 天格→人格(cascade)
    if(chars[2]){
      lines.push([2,'e',1,'n']); // 名1→人格
      if(chars[3]){
        lines.push([2,'e',2,'n']); // 名1→地格
        lines.push([3,'e',2,'n']); // 名2→地格
      }else{
        lines.push([2,'e',2,'n']); // 名1→地格
        lines.push([3,'e',2,'n']); // 虛1→地格
      }
    }
  }else{
    lines.push([0,'e',0,'n']); // 虛1→天格
    lines.push([1,'e',0,'n']); // 姓→天格
    lines.push([1,'e',1,'n']); // 姓→人格
    if(chars[1])lines.push([2,'e',1,'n']); // 名1→人格
    if(chars[2]){
      lines.push([2,'e',2,'n']); // 名1→地格
      lines.push([3,'e',2,'n']); // 名2→地格
    }else{
      lines.push([2,'e',2,'n']); // 名1→地格
      lines.push([3,'e',2,'n']); // 虛1→地格
    }
  }

  function cx(idx,tp){return tp==='e'?EX:NX;}
  function cy(idx,tp){return tp==='e'?ey(idx):ny(idx);}

  const OFF=hasWai?115:0;
  const svgW=460+OFF;
  const blY=(hasWai?nE-1:nE)*R-8;
  const zY=blY+30;
  const totalH=zY+38;
  let sv=`<svg viewBox="0 0 ${svgW} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${svgW}px;display:block;margin:0 auto">`;
  if(hasWai){
    const wY=ny(nN-1);
    const lastCY=ey(nE-2);
    const botVtY=ey(nE-1);
    const wEl=element(grids.wai);
    const wClr=EC[wEl];
    sv+=`<line x1="${OFF+EX-24}" y1="${lastCY}" x2="87" y2="${wY}" stroke="#c8981a" stroke-width="1.5" opacity="0.7"/>`;
    sv+=`<circle cx="65" cy="${botVtY}" r="18" fill="#f5f0e0" stroke="#c8981a" stroke-width="1.5"/>`;
    sv+=`<text x="65" y="${botVtY+5}" text-anchor="middle" fill="#7a5430" font-size="10" font-family="serif">虛一</text>`;
    sv+=`<text x="65" y="${wY-27}" text-anchor="middle" fill="#4a0808" font-size="12" font-weight="bold" font-family="serif">⑤ 遷移宮</text>`;
    sv+=`<circle cx="65" cy="${wY}" r="22" fill="${wClr}" stroke="white" stroke-width="2"/>`;
    sv+=`<text x="65" y="${wY-3}" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">${grids.wai}</text>`;
    sv+=`<text x="65" y="${wY+13}" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11" font-family="sans-serif">${wEl}</text>`;
  }
  sv+=`<g transform="translate(${OFF},0)">`;

  // 連線
  sv+=`<g fill="none">`;
  for(const ln of lines){
    const[ai,at,bi,bt,casc]=ln;
    const x1=cx(ai,at)+(at==='e'?24:20),y1=cy(ai,at);
    const x2=cx(bi,bt)-(bt==='n'?22:0),y2=cy(bi,bt);
    if(casc){
      sv+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#c8981a" stroke-width="1" stroke-dasharray="4,3" opacity="0.65"/>`;
    }else{
      sv+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#c8981a" stroke-width="1.5" opacity="0.7"/>`;
    }
  }
  sv+=`</g>`;

  // 底部橫線
  sv+=`<line x1="12" y1="${blY}" x2="${NX+22}" y2="${blY}" stroke="#8B1A1A" stroke-width="1.5"/>`;

  // entry 圓圈
  entries.forEach((e,i)=>{
    if(hasWai && i===nE-1) return;
    const y=ey(i);
    if(e.type==='vt'){
      sv+=`<circle cx="${EX}" cy="${y}" r="20" fill="#f5f0e0" stroke="#c8981a" stroke-width="1.5"/>`;
      sv+=`<text x="${EX}" y="${y+5}" text-anchor="middle" fill="#7a5430" font-size="11" font-family="serif">虛一</text>`;
    }else{
      const fill=e.type==='sn'?'#8B1A1A':'#1e3a5f';
      sv+=`<circle cx="${EX}" cy="${y}" r="24" fill="${fill}"/>`;
      sv+=`<text x="${EX}" y="${y-3}" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="serif">${e.ch}</text>`;
      sv+=`<text x="${EX}" y="${y+14}" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10" font-family="sans-serif">${e.st}劃</text>`;
      sv+=`<text x="${EX+32}" y="${y+4}" fill="#7a5430" font-size="10" font-family="sans-serif">${e.sub}</text>`;
    }
  });

  // 格 節點
  nodes.forEach((n,i)=>{
    if(n.side==='l') return;
    const y=ny(i);
    const el=element(n.val);
    const clr=EC[el];
    sv+=`<circle cx="${NX}" cy="${y}" r="22" fill="${clr}" stroke="white" stroke-width="2"/>`;
    sv+=`<text x="${NX}" y="${y-3}" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">${n.val}</text>`;
    sv+=`<text x="${NX}" y="${y+13}" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11" font-family="sans-serif">${el}</text>`;
    if(n.side==='r'){
      sv+=`<line x1="${NX+23}" y1="${y}" x2="${LX-4}" y2="${y}" stroke="#c8981a" stroke-width="1" stroke-dasharray="3,2"/>`;
      const pc=n.pals.length;
      const sy2=y-3-(pc-1)*7;
      n.pals.forEach((p,pi)=>{
        sv+=`<text x="${LX}" y="${sy2+pi*14}" fill="#4a0808" font-size="13" font-weight="bold" font-family="serif">${p}</text>`;
      });
      sv+=`<text x="${LX}" y="${sy2+pc*14}" fill="#bbb" font-size="10" font-family="sans-serif">${n.name}</text>`;
    }
  });

  // 總格／命宮（置中）
  const zEl=element(grids.zong);
  sv+=`<circle cx="${ZX}" cy="${zY}" r="23" fill="#8B1A1A" stroke="${EC[zEl]}" stroke-width="3"/>`;
  sv+=`<text x="${ZX}" y="${zY-3}" text-anchor="middle" fill="#f5e6c8" font-size="15" font-weight="bold" font-family="sans-serif">${grids.zong}</text>`;
  sv+=`<text x="${ZX}" y="${zY+13}" text-anchor="middle" fill="rgba(245,230,200,0.9)" font-size="11" font-family="sans-serif">${zEl}</text>`;
  sv+=`<line x1="${ZX+24}" y1="${zY}" x2="${LX-4}" y2="${zY}" stroke="#c8981a" stroke-width="1" stroke-dasharray="3,2"/>`;
  sv+=`<text x="${LX}" y="${zY-3}" fill="#4a0808" font-size="13" font-weight="bold" font-family="serif">① 命宮</text>`;
  sv+=`<text x="${LX}" y="${zY+12}" fill="#bbb" font-size="10" font-family="sans-serif">總格</text>`;

  sv+=`</g>`;
  sv+='</svg>';
  targetEl('mingge-diagram').innerHTML=sv;
  return sv;
}

/* ── 發動年齡備註 ── */
function getPalaceYears(gridVal){
  const s=new Set();
  for(let y=gridVal+1;y<=120;y+=9)s.add(y);
  let b=gridVal-10;
  while(b>0){s.add(b);b-=9;}
  return s;
}
function renderActivationNote(grids,age,chars,isFX){
  const hasWai=isFX?chars.length>=4:chars.length>=3;
  const pals=[
    {name:'① 命宮',  val:grids.zong},
    {name:'② 父母宮',val:grids.tian},
    {name:'③ 疾惡宮',val:grids.ren},
    {name:'④ 奴僕宮',val:grids.di},
  ];
  if(hasWai)pals.push({name:'⑤ 遷移宮',val:grids.wai});
  const now=pals.filter(p=>getPalaceYears(p.val).has(age));
  const next=pals.filter(p=>getPalaceYears(p.val).has(age+1));
  if(!now.length&&!next.length){targetEl('activation-note').innerHTML='';return;}
  let h='<div style="margin-top:14px;padding:11px 16px;background:#fdf8ef;border-radius:8px;border:1px solid #dcc88a;font-size:.9em;line-height:2">';
  if(now.length)
    h+=`<div><span style="background:#8B1A1A;color:#f5e6c8;padding:2px 11px;border-radius:10px;font-weight:bold;font-size:.82em">🔥 正在發動</span>${now.map(p=>`<span style="color:#8B1A1A;font-weight:bold;margin-left:8px">${p.name}</span>`).join('')}</div>`;
  if(next.length)
    h+=`<div style="margin-top:4px"><span style="background:#5a3e08;color:#f5e6c8;padding:2px 11px;border-radius:10px;font-weight:bold;font-size:.82em">⚡ 明年發動</span>${next.map(p=>`<span style="color:#7a5430;font-weight:bold;margin-left:8px">${p.name}</span>`).join('')}</div>`;
  h+='</div>';
  targetEl('activation-note').innerHTML=h;
}

/* ── 五行生剋分析 ── */
function renderWuXing(g){
  const eT=element(g.tian),eR=element(g.ren),eD=element(g.di);
  const EC=ELEMENT_CLASS;
  const pairs=[
    {l:'② 父母宮',r:'③ 疾惡宮',ea:eT,eb:eR,note:'思想功能'},
    {l:'③ 疾惡宮',r:'④ 奴僕宮',ea:eR,eb:eD,note:'行動功能',hi:true},
  ];
  let html=`<div class="wx-grid" style="grid-template-columns:1fr 1fr;max-width:480px">`;
  for(const p of pairs){
    const r=wxRel(p.ea,p.eb);
    const bdr=p.hi?'border:2px solid #cc2200;background:#fff8f8':'';

function renderPalaces(g,by,currentAge){
  const confirmed=[
    {name:'① 命宮', grid:g.zong,type:'命宮'},
    {name:'② 父母宮',grid:g.tian,type:'父母宮'},
    {name:'③ 疾惡宮',grid:g.ren, type:'疾惡宮'},
    {name:'④ 奴僕宮',grid:g.di,  type:'奴僕宮'},
  ];
  const pending=[
    {name:'⑤ 遷移宮',grid:g.wai},
    {name:'⑥ 財宮',  grid:g.ren},
    {name:'⑦ 子女宮',grid:g.di},
    {name:'⑧ 夫妻宮',grid:g.di},
  ];
  const currentROC=new Date().getFullYear()-1911;
  let html='<div class="pgrid8">';
  for(const p of confirmed){
    const ages=calcPalaceAges(p.grid,p.type);
    html+=`<div class="pcard">
      <div class="phdr">${p.name}</div>
      <table class="ptbl"><thead><tr><th>發動年齡</th><th>民國年</th></tr></thead><tbody>`;
    for(let i=0;i<ages.length;i++){

      html+=`<tr class="${isNow?'now':isNext?'next':isPast?'past':''}"><td>${a} 歲</td><td>${rocY} 年 <span style="font-size:.8em;opacity:.7">(${rocY+1911})</span></td></tr>`;
    }
    html+=`</tbody></table></div>`;
  }
  for(const p of pending){
    const el=element(p.grid),cls=ELEMENT_CLASS[el];
    html+=`<div class="pcard">
      <div class="phdr" style="background:linear-gradient(135deg,#5a3e08,#9a6e10)">${p.name}</div>
      <div style="padding:18px;text-align:center">
        <div style="font-size:1.4em;font-weight:bold;margin-bottom:6px">${p.grid} <span class="eb ${cls}">${el}</span></div>

      </div>
    </div>`;

  html+='</div>';
  targetEl('palace-tables').innerHTML=html;
}

/* ── 流年運程 ── */
const FLOW_STAGES=[
  {name:'胎',  mod:'醞釀運',desc:'醞釀新能量，厚積薄發',color:'#2a4a8b'},
  {name:'養',  mod:'吸收運',desc:'吸收能量，學習充電',color:'#1a6a6a'},
  {name:'長生',mod:'長生運',desc:'新生開始，充滿朝氣',color:'#1a8b4a'},
  {name:'冠帶',mod:'開創運',desc:'穩步發展，踏實前進',color:'#2a7a2a'},
  {name:'臨官',mod:'發展運',desc:'能量爆發，大展拳腳',color:'#1a6a1a'},
  {name:'帝旺',mod:'巔峰運',desc:'人生巔峰，最強盛期',color:'#c8981a'},
  {name:'衰',  mod:'老化運',desc:'走下坡，需收斂蓄力',color:'#8a5a00'},
  {name:'病',  mod:'病變運',desc:'身心受阻，慎防損失',color:'#cc4400'},
  {name:'死',  mod:'停滯運',desc:'最低潮，諸事不順',  color:'#8B1A1A'},
  {name:'絕',  mod:'幻滅運',desc:'谷底，轉機即將到來',color:'#5a0e7a'},
];

function calcFlowYear(zongVal,age){
  const units=zongVal%10;
  const offset=(age%10-units+10+3)%10;
  return{stage:FLOW_STAGES[offset],offset,units};
}

function renderFlowYear(zongVal,age,name){
  const{stage,offset,units}=calcFlowYear(zongVal,age);
  const CX=130,CY=130,RO=110,RI=55,N=10;
  const step=2*Math.PI/N;
  let sv=`<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:240px;display:block;margin:0 auto">`;
  for(let i=0;i<N;i++){
    const s=FLOW_STAGES[i];
    const a0=i*step+Math.PI/2-step/2,a1=(i+1)*step+Math.PI/2-step/2;
    const x0=CX+RI*Math.cos(a0),y0=CY+RI*Math.sin(a0);
    const x1=CX+RO*Math.cos(a0),y1=CY+RO*Math.sin(a0);
    const x2=CX+RO*Math.cos(a1),y2=CY+RO*Math.sin(a1);
    const x3=CX+RI*Math.cos(a1),y3=CY+RI*Math.sin(a1);
    const isCur=i===offset,isNxt=i===(offset+1)%N;
    const fill=isCur?s.color:isNxt?s.color+'55':'#f5f0e0';
    const sw=isCur?2.5:1;
    const sc=isCur?'white':isNxt?s.color:'#d4c090';
    sv+=`<path d="M${x0},${y0}L${x1},${y1}A${RO},${RO} 0 0,1 ${x2},${y2}L${x3},${y3}A${RI},${RI} 0 0,0 ${x0},${y0}" fill="${fill}" stroke="${sc}" stroke-width="${sw}"/>`;
    const ma=a0+step/2,lr=(RI+RO)/2;
    const lx=CX+lr*Math.cos(ma),ly=CY+lr*Math.sin(ma);
    sv+=`<text x="${lx}" y="${ly+1}" text-anchor="middle" dominant-baseline="middle" fill="${isCur?'white':s.color}" font-size="${isCur?10:8.5}" font-weight="${isCur?'bold':'normal'}" font-family="serif">${s.name}</text>`;
  }
  sv+=`<circle cx="${CX}" cy="${CY}" r="48" fill="#fff8f0" stroke="#c8981a" stroke-width="2"/>`;
  sv+=`<text x="${CX}" y="${CY-14}" text-anchor="middle" fill="#7a5430" font-size="9.5" font-family="sans-serif">命宮 ${zongVal}</text>`;
  sv+=`<text x="${CX}" y="${CY+4}" text-anchor="middle" fill="${stage.color}" font-size="18" font-weight="bold" font-family="serif">${stage.name}</text>`;
  sv+=`<text x="${CX}" y="${CY+20}" text-anchor="middle" fill="${stage.color}" font-size="9" font-family="sans-serif">${stage.mod}</text>`;
  sv+=`</svg>`;

  let html=`<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">`;
  html+=`<div class="svg-zoomable" style="flex:0 0 auto" onclick="openSvgModal(this.querySelector('svg'))">${sv}</div>`;
  html+=`<div style="flex:1;min-width:160px">
    <div style="background:${stage.color};color:white;padding:8px 16px;border-radius:8px;display:inline-block;font-weight:bold;font-size:1.1em;margin-bottom:10px">${stage.name}（${stage.mod}）</div>
    <div style="color:#4a2a00;font-size:.9em;line-height:1.7;padding:10px 14px;background:#fdf8ef;border-radius:6px;border-left:3px solid ${stage.color}">
      <b>今年運勢：</b>${stage.desc}<br>
      <b>命宮個位：</b>${units} → ${age}歲走 <b style="color:${stage.color}">${stage.name}</b>
    </div>
    <div style="margin-top:10px;font-size:.82em;color:var(--sub)">
      <b>近五年運程：</b><br>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
        ${[-2,-1,0,1,2].map(d=>{
          const a=age+d,o=(a%10-units+10+3)%10,st=FLOW_STAGES[o];
          const isc=d===0;
          return`<span style="padding:3px 9px;border-radius:12px;background:${isc?st.color:'#f0e8d0'};color:${isc?'white':st.color};font-weight:${isc?'bold':'normal'};border:1px solid ${st.color}">${a}歲 ${st.name}</span>`;
        }).join('')}
      </div>
    </div>
  </div>`;
  html+=`</div>`;
  targetEl('flowyear-section').innerHTML=html;
}

function getPalaceYearsActive(grids,age,chars,isFX){
  const hasWai=isFX?chars.length>=4:chars.length>=3;
  const pals=[{name:'① 命宮',val:grids.zong},{name:'② 父母宮',val:grids.tian},{name:'③ 疾惡宮',val:grids.ren},{name:'④ 奴僕宮',val:grids.di}];
  if(hasWai)pals.push({name:'⑤ 遷移宮',val:grids.wai});
  return pals.filter(p=>getPalaceYears(p.val).has(age)).map(p=>p.name);
}

function getPersonData(name,by,bm,bd,isFX){
  const chars=Array.from(name);
  let s,n1,n2,n3;
  if(isFX){s=getS(chars[0]);n1=getS(chars[1]);n2=chars[2]?getS(chars[2]):0;n3=chars[3]?getS(chars[3]):0;}
  else{s=getS(chars[0]);n1=chars[1]?getS(chars[1]):0;n2=chars[2]?getS(chars[2]):0;n3=0;}
  const grids=calcGrids(s,n1,n2,n3,isFX);
  const age=calcAge(by,bm,bd);
  return{name,by,bm,bd,isFX,chars,grids,age,s,n1,n2,n3};
}

function renderComparison(dataA,dataB){
  const curROC=TODAY.getFullYear()-1911;
  const fyA=calcFlowYear(dataA.grids.zong,dataA.age);
  const fyB=calcFlowYear(dataB.grids.zong,dataB.age);

  // ── 兩人命格圖並列 ──

    <div style="background:#fff8f0;border:1px solid #e8d0a0;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:.78em;color:var(--sub);margin-bottom:4px">流年運程</div>
      <div style="background:${fyA.stage.color};color:white;padding:5px 16px;border-radius:20px;display:inline-block;font-weight:bold;font-size:1.05em">${fyA.stage.name}（${fyA.stage.mod}）</div>
      <div style="font-size:.8em;color:#666;margin-top:6px">${fyA.stage.desc}</div>
    </div>
    <div style="background:#f0f4ff;border:1px solid #c0d0f0;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:.78em;color:var(--sub);margin-bottom:4px">流年運程</div>
      <div style="background:${fyB.stage.color};color:white;padding:5px 16px;border-radius:20px;display:inline-block;font-weight:bold;font-size:1.05em">${fyB.stage.name}（${fyB.stage.mod}）</div>
      <div style="font-size:.8em;color:#666;margin-top:6px">${fyB.stage.desc}</div>
    </div>
  </div>`;

  // ── 宮位發動現況對比 ──
  const nowA=getPalaceYearsActive(dataA.grids,dataA.age,dataA.chars,dataA.isFX);
  const nxtA=getPalaceYearsActive(dataA.grids,dataA.age+1,dataA.chars,dataA.isFX);
  const nowB=getPalaceYearsActive(dataB.grids,dataB.age,dataB.chars,dataB.isFX);
  const nxtB=getPalaceYearsActive(dataB.grids,dataB.age+1,dataB.chars,dataB.isFX);
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" class="dual-summary-grid">
    <div style="background:#fff5f5;border:1px solid #f0d0d0;border-radius:8px;padding:12px">
      ${nowA.length?`<div style="margin-bottom:4px"><span style="background:#8B1A1A;color:#f5e6c8;padding:2px 8px;border-radius:8px;font-size:.78em">🔥 正在發動</span>${nowA.map(n=>`<span style="color:#8B1A1A;font-weight:bold;font-size:.85em;margin-left:6px">${n}</span>`).join('')}</div>`:''}
      ${nxtA.length?`<div><span style="background:#5a3e08;color:#f5e6c8;padding:2px 8px;border-radius:8px;font-size:.78em">⚡ 明年發動</span>${nxtA.map(n=>`<span style="color:#7a5430;font-weight:bold;font-size:.85em;margin-left:6px">${n}</span>`).join('')}</div>`:''}
      ${!nowA.length&&!nxtA.length?'<div style="color:#bbb;font-size:.85em">目前無宮位發動</div>':''}
    </div>
    <div style="background:#f0f4ff;border:1px solid #c0d0f0;border-radius:8px;padding:12px">
      ${nowB.length?`<div style="margin-bottom:4px"><span style="background:#1a3a6b;color:#e0eaff;padding:2px 8px;border-radius:8px;font-size:.78em">🔥 正在發動</span>${nowB.map(n=>`<span style="color:#1a3a6b;font-weight:bold;font-size:.85em;margin-left:6px">${n}</span>`).join('')}</div>`:''}
      ${nxtB.length?`<div><span style="background:#0e2050;color:#e0eaff;padding:2px 8px;border-radius:8px;font-size:.78em">⚡ 明年發動</span>${nxtB.map(n=>`<span style="color:#1a4a8b;font-weight:bold;font-size:.85em;margin-left:6px">${n}</span>`).join('')}</div>`:''}
      ${!nowB.length&&!nxtB.length?'<div style="color:#bbb;font-size:.85em">目前無宮位發動</div>':''}

  function getPalaceEvents(data){

    const ageA=yr-dataA.by+1,ageB=yr-dataB.by+1;
    const fyA2=calcFlowYear(dataA.grids.zong,ageA),fyB2=calcFlowYear(dataB.grids.zong,ageB);
    html+=`<tr style="${bg}">
      <td style="padding:5px 8px;text-align:center;border:1px solid #eee;white-space:nowrap;font-size:.85em">
        ${yr}<span style="color:#999;font-size:.75em;margin-left:2px">(${yr+1911})</span>
        ${isCur?'<br><span style="color:#8B1A1A;font-size:.7em;font-weight:bold">▶今年</span>':''}
        ${isOv&&!isCur?'<br><span style="color:#9a6000;font-size:.7em;font-weight:bold">⚡重疊</span>':''}
      </td>
      <td style="padding:5px 8px;text-align:center;border:1px solid #eee">
        <span style="background:${fyA2.stage.color};color:white;padding:1px 6px;border-radius:8px;font-size:.75em;font-weight:bold">${fyA2.stage.name}</span>
        ${aEv.length?'<br>'+aEv.map(n=>`<span style="color:#8B1A1A;font-size:.78em;font-weight:bold">${n}</span>`).join('<br>'):''}
        <span style="font-size:.68em;color:#aaa;display:block">${ageA}歲</span>
      </td>
      <td style="padding:5px 8px;text-align:center;border:1px solid #eee">
        <span style="background:${fyB2.stage.color};color:white;padding:1px 6px;border-radius:8px;font-size:.75em;font-weight:bold">${fyB2.stage.name}</span>
        ${bEv.length?'<br>'+bEv.map(n=>`<span style="color:#1a3a6b;font-size:.78em;font-weight:bold">${n}</span>`).join('<br>'):''}
        <span style="font-size:.68em;color:#aaa;display:block">${ageB}歲</span>
      </td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  document.getElementById('comparison-content').innerHTML=html;
}

function openSvgModal(svgEl){
  const modal=document.getElementById('svg-modal');
  const inner=document.getElementById('svg-modal-inner');
  inner.innerHTML=svgEl.outerHTML;
  modal.classList.add('open');
}
function closeSvgModal(){
  document.getElementById('svg-modal').classList.remove('open');
}
</script>

<div id="svg-modal" onclick="if(event.target===this)closeSvgModal()">
  <div id="svg-modal-inner">
    <div style="text-align:right;margin-bottom:8px">
      <button onclick="closeSvgModal()" style="background:none;border:none;font-size:1.4em;cursor:pointer;color:#7a5430">✕</button>
    </div>
  </div>
</div>
</body>
</html>
